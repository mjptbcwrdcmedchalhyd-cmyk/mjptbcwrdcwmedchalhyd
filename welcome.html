<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Website Inauguration</title>

<style>
 .fancy-text {
            font-size: 50px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;

            /* Gradient text */
            background: linear-gradient(45deg, #ffdd00, #ff4e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            /* Shadow effect */
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);

            /* Animation */
            animation: glow 2s infinite alternate;
        }

    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle, #1a2a6c, #b21f1f, #fdbb2d);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
       // font-family: Arial, sans-serif;
font-family:Georgia,serif;    
}

    /* Ribbon */
    .ribbon {
        position: absolute;
        width: 100%;
        height: 100px;
        background: crimson;
        color: white;
        font-size: 25px;
        font-weight: bold;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        z-index: 2;
        transition: transform 0.3s ease;
    }

    .ribbon:hover {
        transform: scale(1.05);
    }

    /* Cut animation */
    .cut {
        animation: cutRibbon 0.8s forwards;
    }

    @keyframes cutRibbon {
        0% { transform: scaleX(1); opacity: 1; }
        100% { transform: scaleX(0); opacity: 0; }
    }

    /* Sparkles */
    .sparkle {
        position: absolute;
        width: 10px;
        height: 10px;
        background: gold;
        border-radius: 50%;
        animation: sparkleAnim 1s linear forwards;
    }

    @keyframes sparkleAnim {
        0% {
            opacity: 1;
            transform: scale(1);
        }
        100% {
            opacity: 0;
            transform: translate(var(--x), var(--y)) scale(2);
        }
    }

    /* Scissors emoji */
    .scissor {
        position: absolute;
        font-size: 40px;
        z-index: 3;
        animation: moveScissor 0.8s forwards;
    }

    @keyframes moveScissor {
        0% { transform: translateX(-200px); }
        100% { transform: translateX(200px); }
    }

</style>
</head>

<body>
<div class="fancy-text"><i> Welcome!</i> </div><br>
<div class="ribbon" id="ribbon" onclick="startInauguration(event)">
   <i> 🎉🎉🎉Grand Launch of MJPTBCWRDC(W) Medchal & Hyderabad Website!🎉🎉🎉<br><br>&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp
&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp🎉🎉🎉🎉🎉Click to Cut Ribbon! 🎉🎉🎉🎉🎉</i>
</div>

<!-- Sound -->
<audio id="sound" src="images/ribbon_cutting_sound.mp3"></audio>

<script>
function startInauguration(e) {
    let ribbon = document.getElementById("ribbon");
    let sound = document.getElementById("sound");

    // Play sound
    sound.play();

    // Add scissors animation
    let scissor = document.createElement("div");
    scissor.className = "scissor";
    scissor.innerHTML = "✂️";
    scissor.style.top = (window.innerHeight / 2 - 20) + "px";
    scissor.style.left = "50%";
    document.body.appendChild(scissor);

    // Cut ribbon
    setTimeout(() => {
        ribbon.classList.add("cut");
    }, 300);

    // Sparkles
    createSparkles(e.clientX, e.clientY);

    // Redirect after animation
    setTimeout(() => {
        window.location.href = "index.html";
    }, 2000);
}

function createSparkles(x, y) {
    for (let i = 0; i < 140; i++) {
        let sparkle = document.createElement("div");
        sparkle.className = "sparkle";

        let offsetX = (Math.random() - 0.5) * 1000 + "px";
        let offsetY = (Math.random() - 0.5) * 1000 + "px";

        sparkle.style.left = x + "px";
        sparkle.style.top = y + "px";
        sparkle.style.setProperty('--x', offsetX);
        sparkle.style.setProperty('--y', offsetY);

        document.body.appendChild(sparkle);

        setTimeout(() => sparkle.remove(), 2000);
    }
}
</script>

</body>
</html>
